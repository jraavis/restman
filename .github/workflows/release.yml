# Build + publish a cross-platform release: macOS (universal ARM64+Intel,
# ad-hoc signed, unrelated to the Tauri updater signature), Windows
# (msi+nsis), Linux (deb+rpm+appimage).
#
# Trigger: push a `v*` tag (e.g. `git tag v0.4.4 && git push origin v0.4.4`)
# or run manually via workflow_dispatch. Each platform is a separate matrix
# job; tauri-action uploads assets to the same release (shared tagName) and
# merges its platform entry into the release's latest.json rather than
# clobbering it. The release is created as a DRAFT during the matrix so a
# partially-built release (e.g. macOS done, Linux still building) is never
# visible to updater clients; a final `publish` job un-drafts it only after
# every platform leg succeeds.
#
# TAURI_SIGNING_PRIVATE_KEY(_PASSWORD): the updater signing key (counterpart
# of the pubkey in src-tauri/tauri.conf.json) — unrelated to Apple/Windows
# code-signing certs, which this repo doesn't have.

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail if package.json / Cargo.toml / tauri.conf.json versions disagree
        run: |
          PKG=$(node -p "require('./package.json').version")
          CARGO=$(node -p "require('fs').readFileSync('src-tauri/Cargo.toml','utf8').match(/^version = \"([^\"]+)\"/m)[1]")
          TAURI=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "package.json=$PKG  Cargo.toml=$CARGO  tauri.conf.json=$TAURI"
          if [ "$PKG" != "$CARGO" ] || [ "$PKG" != "$TAURI" ]; then
            echo "::error::Version mismatch across package.json ($PKG), Cargo.toml ($CARGO), tauri.conf.json ($TAURI) — the release tag is derived from tauri.conf.json, so a drift here silently retags/overwrites the wrong version."
            exit 1
          fi

  build:
    needs: check-versions
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin --bundles app,dmg
          - platform: ubuntu-22.04
            args: --bundles deb,rpm,appimage
          - platform: windows-latest
            args: --bundles msi,nsis
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Tauri v2 needs webkit2gtk 4.1+, hence ubuntu-22.04 (not 20.04).
      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils \
            libgtk-3-dev

      - run: npm ci

      # The universal macOS build only lipos the MAIN binary (restman), but
      # the bundler still copies every cargo bin target into the .app — so
      # target/universal-apple-darwin/release/restman-cli must exist or the
      # bundle step fails ("Failed to copy binary ... does not exist").
      # Pre-build both arches of the CLI and lipo them ourselves; single-arch
      # platforms (Windows/Linux) get restman-cli from the ordinary build.
      - name: Pre-build universal restman-cli (macOS)
        if: matrix.platform == 'macos-latest'
        working-directory: src-tauri
        run: |
          cargo build --release --bin restman-cli --target aarch64-apple-darwin
          cargo build --release --bin restman-cli --target x86_64-apple-darwin
          mkdir -p target/universal-apple-darwin/release
          lipo -create \
            target/aarch64-apple-darwin/release/restman-cli \
            target/x86_64-apple-darwin/release/restman-cli \
            -output target/universal-apple-darwin/release/restman-cli

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # The key is passwordless (see PLAN.md Phase 8 follow-ups); an
          # explicit empty string stops the CLI from prompting interactively.
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: v__VERSION__
          releaseName: "restman v__VERSION__"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Un-draft the release now that every platform leg succeeded
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh release edit "v$VERSION" --draft=false --repo "${{ github.repository }}"
