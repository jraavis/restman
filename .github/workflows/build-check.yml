# Cross-platform build verification — NOT a release/publish workflow.
#
# tauri.conf.json's bundle.targets lists dmg/app/msi/nsis/deb/rpm/appimage,
# but only the macOS half has ever actually been built (see release.yml,
# which is macOS-only, and PLAN.md's "cross-platform release verification"
# open item). This workflow proves `cargo tauri build` actually produces
# the Windows/Linux artifacts on real runners, and that restman-cli's
# `dirs`-based --db default path at least compiles/tests on each OS.
#
# Artifacts are uploaded to the Actions run (actions/upload-artifact), never
# to a GitHub Release — no updater/latest.json involvement, nothing public.
#
# Trigger: manual only (workflow_dispatch). Not on push/tag — this is a
# verification tool, not part of the release path.

name: Build check (cross-platform)

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            bundles: app,dmg
          - os: windows-latest
            bundles: msi,nsis
          - os: ubuntu-22.04
            bundles: deb,rpm,appimage
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Tauri v2 on Linux needs webkit2gtk 4.1+ (hence ubuntu-22.04, not 20.04)
      # plus the AppIndicator/rsvg/patchelf deps tauri-action itself doesn't install.
      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - run: npm ci

      - name: cargo test (lib + restman-cli, per-OS --db default path)
        working-directory: src-tauri
        run: cargo test --lib --bin restman-cli

      - uses: tauri-apps/tauri-action@v1
        env:
          # tauri.conf.json's pubkey means every build tries to sign an
          # updater artifact (app.tar.gz/nsis-updater/appimage), even
          # build-only ones — omitting this fails with "public key found,
          # but no private key" before any bundle is even attempted.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          args: --bundles ${{ matrix.bundles }}

      # Guard against the wrong-binary-bundled class of bug: with two bin
      # targets (restman GUI, restman-cli), tauri-cli once selected the CLI
      # as the app's main binary and mainBinaryName merely renamed it — the
      # file was called "restman" but was the headless CLI (caught only
      # because macOS Gatekeeper said "damaged"; filename/Info.plist checks
      # passed). Identity, not name: the GUI links wry (webview), the CLI
      # never does, and on macOS the linker-signed identifier bakes in the
      # true crate name at link time.
      - name: Assert bundled binary is the GUI (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          APP=src-tauri/target/release/bundle/macos/restman.app
          ID=$(codesign -dv "$APP" 2>&1 | grep '^Identifier=' | cut -d= -f2)
          echo "signing identifier: $ID"
          case "$ID" in
            restman_cli*) echo "::error::bundled binary is restman-cli (identifier $ID)"; exit 1;;
          esac
          WRY=$(strings "$APP/Contents/MacOS/restman" | grep -c wry || true)
          echo "wry string hits: $WRY"
          if [ "$WRY" -eq 0 ]; then
            echo "::error::no wry strings in bundled binary — this is not the GUI build"; exit 1
          fi

      - name: Assert bundled binary is the GUI (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          DEB=$(ls src-tauri/target/release/bundle/deb/*.deb)
          dpkg-deb --fsys-tarfile "$DEB" | tar -xO ./usr/bin/restman > /tmp/deb-restman
          WRY=$(strings /tmp/deb-restman | grep -c wry || true)
          echo "wry string hits: $WRY"
          if [ "$WRY" -eq 0 ]; then
            echo "::error::no wry strings in .deb's usr/bin/restman — this is not the GUI build"; exit 1
          fi

      - name: Upload built bundles
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.AppImage
          if-no-files-found: error
